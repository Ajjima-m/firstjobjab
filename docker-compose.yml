services:
  web:
    build: .
    container_name: job_tracker_web
    ports:
      - "8081:80"
    volumes:
      - ./src:/var/www/html
    depends_on:
      - db

  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: job_tracker
      MYSQL_ROOT_PASSWORD: root_password_123
      MYSQL_USER: tracker_user
      MYSQL_PASSWORD: tracker_password_123
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin:5.2
    restart: always
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: root_password_123
    ports:
      - "8082:80"
    depends_on:
      - db

volumes:
  db_data: